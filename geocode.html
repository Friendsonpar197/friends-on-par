<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geocode Courses — Friends on Par Admin</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; background: #f5f5f5; }
  h1 { color: #2D6A4F; }
  .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn { background: #2D6A4F; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress { background: #eee; border-radius: 100px; height: 10px; margin: 1rem 0; overflow: hidden; }
  .progress-fill { height: 100%; background: #B7E05A; border-radius: 100px; transition: width 0.3s; width: 0%; }
  .log { background: #1A1F3C; color: #B7E05A; padding: 1rem; border-radius: 8px; font-size: 0.8rem; font-family: monospace; height: 300px; overflow-y: auto; }
  .log-line { margin-bottom: 0.3rem; }
  .log-line.error { color: #FF6B6B; }
  .log-line.success { color: #B7E05A; }
  .log-line.info { color: rgba(255,255,255,0.6); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
  .stat { background: #f5f5f5; border-radius: 8px; padding: 0.8rem; text-align: center; }
  .stat-val { font-size: 1.8rem; font-weight: 700; color: #2D6A4F; }
  .stat-label { font-size: 0.75rem; color: #888; margin-top: 0.2rem; }
</style>
</head>
<body>

<script>
  const SUPABASE_URL = 'https://ugybxownmfsqhmdncrdl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVneWJ4b3dubWZzcWhtZG5jcmRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTQyNTgsImV4cCI6MjA5MDA3MDI1OH0.lR1ane15u4tNwy9lOMXOn9ORQzCPY4mgNffGJr0KTnY';
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<h1>⛳ Course Geocoder</h1>
<p style="color:#888;margin-bottom:1.5rem;">This tool automatically looks up GPS coordinates for all courses missing lat/lng data. Run it once — it will process all courses and update your database.</p>

<div class="card">
  <div class="stats">
    <div class="stat"><div class="stat-val" id="statTotal">–</div><div class="stat-label">Total Courses</div></div>
    <div class="stat"><div class="stat-val" id="statDone">0</div><div class="stat-label">Geocoded</div></div>
    <div class="stat"><div class="stat-val" id="statFailed">0</div><div class="stat-label">Failed</div></div>
  </div>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
  <button class="btn" id="startBtn" onclick="startGeocoding()">Start Geocoding All Courses</button>
</div>

<div class="card">
  <div class="log" id="log">
    <div class="log-line info">Ready — click Start to begin geocoding all courses...</div>
  </div>
</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let done = 0, failed = 0, total = 0;

function log(msg, type = 'info') {
  const logEl = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function updateStats() {
  document.getElementById('statDone').textContent = done;
  document.getElementById('statFailed').textContent = failed;
  document.getElementById('progressFill').style.width = (((done + failed) / total) * 100).toFixed(0) + '%';
}

async function geocodeCourse(course) {
  const query = encodeURIComponent(course.name + ' golf course ' + course.location);
  const url = 'https://nominatim.openstreetmap.org/search?q=' + query + '&format=json&limit=1&countrycodes=us';

  try {
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();

    if (data && data.length > 0) {
      const lat = parseFloat(data[0].lat);
      const lng = parseFloat(data[0].lon);

      const { error } = await db
        .from('courses')
        .update({ lat, lng })
        .eq('id', course.id);

      if (error) {
        log('✗ ' + course.name + ' — DB error: ' + error.message, 'error');
        failed++;
      } else {
        log('✓ ' + course.name + ' → ' + lat.toFixed(4) + ', ' + lng.toFixed(4), 'success');
        done++;
      }
    } else {
      log('✗ ' + course.name + ' — not found', 'error');
      failed++;
    }
  } catch(e) {
    log('✗ ' + course.name + ' — network error', 'error');
    failed++;
  }

  updateStats();
  // Delay to respect Nominatim rate limit (1 request per second)
  await new Promise(r => setTimeout(r, 1100));
}

async function startGeocoding() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Geocoding...';
  done = 0; failed = 0;

  // Fetch all courses missing coordinates
  const { data: courses, error } = await db
    .from('courses')
    .select('id, name, location')
    .or('lat.is.null,lng.is.null')
    .order('name');

  if (error || !courses) {
    log('Failed to load courses: ' + (error?.message || 'unknown error'), 'error');
    btn.disabled = false;
    return;
  }

  total = courses.length;
  document.getElementById('statTotal').textContent = total;
  log('Found ' + total + ' courses to geocode...', 'info');

  if (total === 0) {
    log('All courses already have coordinates!', 'success');
    btn.disabled = false;
    btn.textContent = 'All Done!';
    return;
  }

  for (const course of courses) {
    await geocodeCourse(course);
  }

  log('', 'info');
  log('Complete! ' + done + ' geocoded, ' + failed + ' failed.', 'success');
  btn.textContent = 'Done!';
}
</script>
</body>
</html>
